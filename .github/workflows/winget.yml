name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish to WinGet (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Submit manifest PR to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: AlvinUnreal.LazySkills
          installers-regex: 'lazyskills_Windows_.*\.zip'
          max-versions-to-keep: 5
          release-tag: ${{ inputs.release_tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
